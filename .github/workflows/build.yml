name: Build Docker Images

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild all images'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      dockerfiles: ${{ steps.changes.outputs.dockerfiles }}
    steps:
      - uses: actions/checkout@v4

      - id: changes
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] && [[ "${{ inputs.force_rebuild }}" == "true" ]]; then
            echo "dockerfiles=$(find . -name '*.dockerfile' -not -path './.git/*' | jq -R -s -c 'split("\n") | map(select(length > 0))')" >> $GITHUB_OUTPUT
          else
            echo "dockerfiles=$(git diff --name-only HEAD~1 origin/master HEAD -- '*.dockerfile' 'Dockerfile' | jq -R -s -c 'split("\n") | map(select(length > 0))')" >> $GITHUB_OUTPUT
          fi

  build:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.dockerfiles != '[]'
    strategy:
      matrix:
        dockerfile: ${{ fromJson(needs.detect-changes.outputs.dockerfiles) }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract image name and tag
        id: image
        run: |
          DOCKERFILE="${{ matrix.dockerfile }}"
          NAME="${DOCKERFILE#./}"
          NAME="${NAME%.dockerfile}"
          NAME="${NAME//\//-}"
          TAG=$(date +%Y-%m-%d).${{ github.run_number }}
          FULL_IMAGE="${{ env.REGISTRY }}/${{ env.OWNER }}/${NAME}:${TAG}"
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "full_image=$FULL_IMAGE" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.image.outputs.full_image }}
          dockerfile: ${{ matrix.dockerfile }}
